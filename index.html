<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>e-hina</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-color: #FFFFFF;
            --secondary-bg: #F2F2F7;
            --accent-orange: #FF9500;
            --text-main: #000000;
            --text-sub: #8E8E93;
            --radius: 20px;
        }

        /* 画面全体を固定、スクロールさせない */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, "SF Pro Display", "Hiragino Kaku Gothic ProN", sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
        }

        /* 画面遷移の基本構造 */
        .view {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            padding: 60px 24px 44px; /* 上部のセーフエリアを考慮 */
            box-sizing: border-box;
            z-index: 10;
        }

        .active { display: flex; }

        /* --- ヘッダー領域 --- */
        .header { margin-bottom: 30px; }
        .year-text { font-size: 14px; font-weight: 600; color: var(--text-sub); margin-bottom: 4px; }
        .title-text { font-size: 34px; font-weight: 800; color: var(--text-main); margin: 0; }

        /* --- お知らせセクション --- */
        .info-section {
            background: var(--secondary-bg);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 24px;
        }
        .section-label { font-size: 12px; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; }
        .info-body { font-size: 15px; color: var(--text-main); line-height: 1.5; margin: 0; }

        /* --- ステータスエリア --- */
        .status-grid {
            display: flex;
            gap: 12px;
            margin-bottom: auto; /* ボタンを下に押しやる */
        }
        .status-box {
            flex: 1;
            background: var(--bg-color);
            border: 1px solid #E5E5EA;
            border-radius: var(--radius);
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .box-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 6px; }
        .box-value { font-size: 28px; font-weight: 700; color: var(--text-main); }
        .box-value span { font-size: 14px; margin-left: 2px; }

        /* --- 確定ボタンエリア --- */
        .button-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-main {
            width: 100%;
            height: 72px;
            background: var(--text-main);
            color: #FFF;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-orange { background: var(--accent-orange); }
        .btn-secondary { background: none; color: var(--text-sub); font-size: 15px; }

        /* --- スライド確認画面 --- */
        #confirm-view {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            display: flex; /* transitionを効かせるため */
            z-index: 20;
        }
        #confirm-view.open { transform: translateX(0); }

        /* ログイン入力 */
        .login-input {
            width: 100%; height: 64px; background: var(--secondary-bg);
            border: none; border-radius: 16px; font-size: 24px; text-align: center;
            margin-top: 40px; margin-bottom: 20px; font-weight: 700; letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div id="login-view" class="view active">
        <div class="header">
            <h1 class="title-text">e-hina</h1>
        </div>
        <p style="color:var(--text-sub);">パスコードを入力してください</p>
        <input type="password" id="pass-code" class="login-input" placeholder="••••" maxlength="7">
        <button class="btn-main" onclick="onLogin()">ログイン</button>
    </div>

    <div id="home-view" class="view">
        <div class="header">
            <div class="year-text" id="disp-year">2027年度</div>
            <h1 class="title-text">ホーム</h1>
        </div>

        <div class="info-section">
            <div class="section-label">お知らせ</div>
            <p class="info-body" id="disp-news">現在お知らせはありません</p>
        </div>

        <div class="status-grid">
            <div class="status-box">
                <span class="box-label">保有ポイント</span>
                <div class="box-value" id="disp-pt">0<span>pt</span></div>
            </div>
            <div class="status-box" style="background:var(--secondary-bg); border:none;">
                <span class="box-label" id="disp-date">--/-- ---</span>
                <div class="box-value" id="disp-time" style="font-size: 22px;">00:00</div>
            </div>
        </div>

        <div class="button-area">
            <button class="btn-main btn-orange" onclick="openConfirm()">支払い申請を確定する</button>
        </div>
    </div>

    <div id="confirm-view" class="view">
        <div class="header">
            <h1 class="title-text" style="font-size: 24px;">内容の確認</h1>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center;">
            <div class="section-label">お支払い合計</div>
            <div style="font-size: 60px; font-weight: 900; color:#FF3B30; margin:10px 0;">¥3,300</div>
            <p style="color:var(--text-main); font-weight: 500; line-height:1.6;">現金の準備ができたら、<br>申請を確定してください。</p>
        </div>
        <div class="button-area">
            <button class="btn-main btn-orange" onclick="commitPayment()">申請を確定する</button>
            <button class="btn-main btn-secondary" onclick="closeConfirm()">キャンセル</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCZmx28FAnn8kS6S0cnsAIIKhqjpWbXb2A",
            authDomain: "e-hina-app.firebaseapp.com",
            projectId: "e-hina-app",
            storageBucket: "e-hina-app.firebasestorage.app",
            messagingSenderId: "355053921531",
            appId: "1:355053921531:web:214aafe5275ec4f4033c5e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ログイン
        window.onLogin = () => {
            if(document.getElementById('pass-code').value === 'ooj1371') {
                document.cookie = "auth=valid; max-age=315360000; path=/";
                showHome();
            } else { alert("パスコードが違います"); }
        };

        function showHome() {
            document.getElementById('login-view').classList.remove('active');
            document.getElementById('home-view').classList.add('active');
            sync();
        }

        // Firebase同期
        function sync() {
            onValue(ref(db, 'system_config'), (snap) => {
                const data = snap.val();
                if(data) {
                    document.getElementById('disp-year').innerText = (data.year || 2027) + "年度";
                    document.getElementById('disp-pt').innerHTML = (data.points || 0) + "<span>pt</span>";
                }
            });
        }

        // スライド演出
        window.openConfirm = () => document.getElementById('confirm-view').classList.add('open');
        window.closeConfirm = () => document.getElementById('confirm-view').classList.remove('open');

        // ★支払い確定処理
        window.commitPayment = () => {
            const reqRef = ref(db, 'requests');
            push(reqRef, {
                amount: 3300,
                status: "pending",
                timestamp: Date.now()
            }).then(() => {
                alert("申請を確定しました。");
                closeConfirm();
            }).catch(err => alert("エラーが発生しました"));
        };

        // 時計
        setInterval(() => {
            const now = new Date();
            const days = ['日','月','火','水','木','金','土'];
            document.getElementById('disp-date').innerText = `${now.getMonth()+1}/${now.getDate()} (${days[now.getDay()]})`;
            document.getElementById('disp-time').innerText = now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
        }, 1000);

        if(document.cookie.includes('auth=valid')) showHome();
    </script>
</body>
</html>
